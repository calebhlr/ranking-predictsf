<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PredictSF — Ranking Geral</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    :root{
        --ink:#0A0A0A;
        --paper:#F5F3EC;
        --mow:#E8E3D4;
        --yellow:#FFE600;
        --red:#FF3300;
        --line:#0A0A0A;
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    html{
        background:var(--paper);
        background-image: repeating-linear-gradient(
            135deg,
            var(--paper) 0px,
            var(--paper) 56px,
            var(--mow) 56px,
            var(--mow) 112px
        );
        min-height:100%;
    }

    body{
        background:transparent;
        color:var(--ink);
        font-family:'JetBrains Mono', monospace;
        min-height:100vh;
        min-height:100dvh;
        padding:24px 16px 64px;
    }

    .display{ font-family:'Space Grotesk', sans-serif; }

    .sr-only{
        position:absolute; width:1px; height:1px; padding:0; margin:-1px;
        overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    .wrap{ max-width:720px; margin:0 auto; }

    /* ---------- HEADER ---------- */
    .masthead{
        background:var(--ink);
        color:var(--paper);
        border:4px solid var(--ink);
        padding:22px 20px;
        margin-bottom:20px;
        position:relative;
        box-shadow:8px 8px 0 var(--yellow);
    }

    .masthead-top{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        gap:12px;
    }

    .kicker{
        font-size:.7rem;
        letter-spacing:.18em;
        text-transform:uppercase;
        color:var(--yellow);
        font-weight:800;
    }

    .title{
        font-size:2.6rem;
        font-weight:900;
        line-height:.95;
        letter-spacing:-0.02em;
        text-transform:uppercase;
    }

    .subtitle{
        font-size:.95rem;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.06em;
        margin-top:10px;
        border-top:2px solid var(--yellow);
        padding-top:10px;
    }

    .subtitle-yellow{
        color:var(--yellow);
    }

    .badge{
        border:2px solid var(--paper);
        padding:6px 10px;
        font-size:.7rem;
        font-weight:800;
        text-transform:uppercase;
        letter-spacing:.1em;
        white-space:nowrap;
    }

    /* ---------- LIST ---------- */
    .ranking-list{
        display:flex;
        flex-direction:column;
        gap:16px;
    }

    .player-card{
        position:relative;
        background:var(--paper);
        border:4px solid var(--ink);
        box-shadow:6px 6px 0 var(--ink);
        display:grid;
        grid-template-columns:64px auto 1fr auto;
        align-items:center;
        gap:16px;
        padding:14px 18px;
        transition:transform .12s ease, box-shadow .12s ease;
    }

    .player-card:hover{
        transform:translate(-3px,-3px);
        box-shadow:9px 9px 0 var(--ink);
    }

    .player-card.rank-1{ background:var(--yellow); }
    .player-card.rank-1 .position-num{ color:var(--ink); }

    .position-num{
        font-family:'Space Grotesk', sans-serif;
        font-weight:900;
        font-size:2.4rem;
        line-height:1;
        color:var(--ink);
        opacity:.9;
        text-align:center;
    }

    .avatar{
        width:48px; height:48px;
        border:3px solid var(--ink);
        background:var(--ink);
        color:var(--paper);
        display:flex; align-items:center; justify-content:center;
        font-weight:800;
        font-size:1.1rem;
        flex-shrink:0;
        font-family:'Space Grotesk', sans-serif;
    }

    .player-card.rank-1 .avatar{ background:var(--red); color:var(--paper); border-color:var(--ink); }

    .player-info{ min-width:0; }

    .player-name{
        font-family:'Space Grotesk', sans-serif;
        font-weight:700;
        font-size:1.05rem;
        text-transform:uppercase;
        letter-spacing:.01em;
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
    }

    .player-rank-label{
        font-size:.72rem;
        font-weight:600;
        letter-spacing:.08em;
        text-transform:uppercase;
        opacity:.65;
        margin-top:2px;
    }

    .points-display{ text-align:right; }

    .points-value{
        font-family:'Space Grotesk', sans-serif;
        font-weight:900;
        font-size:1.6rem;
        line-height:1;
    }

    .points-label{
        font-size:.65rem;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.1em;
        opacity:.65;
        margin-top:2px;
    }

    /* ---------- STATUS ---------- */
    .status-message{
        border:4px dashed var(--ink);
        padding:32px 20px;
        text-align:center;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.04em;
        font-size:.9rem;
        background:var(--paper);
    }

    .status-error{
        border-color:var(--red);
        color:var(--red);
        background:#FFECE6;
    }

    .status-error::before{
        content:"⚠ ERRO — ";
    }

    /* ---------- FOOTER ---------- */
    .footer{
        margin-top:28px;
        font-size:.7rem;
        text-transform:uppercase;
        letter-spacing:.1em;
        text-align:center;
        opacity:.6;
        font-weight:600;
    }

    @media (max-width:520px){
        html{
            background-image: repeating-linear-gradient(
                135deg,
                var(--paper) 0px,
                var(--paper) 32px,
                var(--mow) 32px,
                var(--mow) 64px
            );
        }
        .title{ font-size:1.9rem; }
        .player-card{
            grid-template-columns:44px 40px 1fr auto;
            gap:10px;
            padding:12px 14px;
        }
        .position-num{ font-size:1.7rem; }
        .avatar{ width:38px; height:38px; font-size:.9rem; }
        .points-value{ font-size:1.25rem; }
    }
</style>
</head>
<body>
    <div class="wrap">

        <header class="masthead">
            <div class="masthead-top">
                <div>
                    <h1 class="title">PredictSF</h1>
                </div>
                <span class="badge" id="playerCountBadge">— jogadores</span>
            </div>
            <p class="subtitle subtitle-yellow">Ranking Geral</p>
        </header>

        <main class="ranking-list" id="rankingContainer" aria-live="polite" aria-busy="false">
            <p class="status-message">Carregando ranking...</p>
        </main>

        <footer class="footer">
            <span id="updatedAt">Ranking carregado a partir dos dados desta página</span>
        </footer>
    </div>

    <script type="application/json" id="rankingData">
[
    { "id": 1, "name": "Caleb", "avatar": "C", "points": 1 },
    { "id": 2, "name": "Yago", "avatar": "Y", "points": 2 },
    { "id": 3, "name": "Vitor", "avatar": "V", "points": 3 },
    { "id": 4, "name": "Daniel", "avatar": "D", "points": 3 },
    { "id": 5, "name": "Tassinari", "avatar": "T", "points": 0 },
    { "id": 6, "name": "Henrique", "avatar": "H", "points": 0 },
    { "id": 7, "name": "Estevão", "avatar": "E", "points": 2 },
    { "id": 8, "name": "Rafael", "avatar": "R", "points": 2 },
    { "id": 9, "name": "JV", "avatar": "J", "points": 2 }
]
    </script>

    <script>
        const POINTS_FORMATTER = new Intl.NumberFormat('pt-BR');

        function isValidPlayer(player) {
            return Boolean(
                player &&
                typeof player.name === 'string' &&
                player.name.trim() &&
                typeof player.avatar === 'string' &&
                player.avatar.trim() &&
                Number.isFinite(player.points)
            );
        }

        function sortPlayers(players) {
            return players
                .filter(isValidPlayer)
                .sort((a, b) => b.points - a.points || a.name.localeCompare(b.name, 'pt-BR'));
        }

        function formatPoints(points) {
            return POINTS_FORMATTER.format(points);
        }

        function createPlayerCard(player, position) {
            const card = document.createElement('article');
            card.className = 'player-card' + (position === 1 ? ' rank-1' : '');
            card.setAttribute('aria-label', `${position}º lugar: ${player.name} com ${formatPoints(player.points)} pontos`);

            const positionElement = document.createElement('div');
            positionElement.className = 'position-num';
            positionElement.textContent = String(position).padStart(2, '0');

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = player.avatar.trim().slice(0, 2).toUpperCase();
            avatar.setAttribute('aria-hidden', 'true');

            const info = document.createElement('div');
            info.className = 'player-info';

            const name = document.createElement('h3');
            name.className = 'player-name';
            name.textContent = player.name.trim();

            const rankLabel = document.createElement('div');
            rankLabel.className = 'player-rank-label';
            rankLabel.textContent = `${position}º lugar`;

            info.appendChild(name);
            info.appendChild(rankLabel);

            const pointsDisplay = document.createElement('div');
            pointsDisplay.className = 'points-display';

            const pointsValue = document.createElement('div');
            pointsValue.className = 'points-value';
            pointsValue.textContent = formatPoints(player.points);

            const pointsUnit = document.createElement('div');
            pointsUnit.className = 'points-label';
            pointsUnit.textContent = player.points === 1 ? 'ponto' : 'pontos';

            pointsDisplay.appendChild(pointsValue);
            pointsDisplay.appendChild(pointsUnit);

            card.appendChild(positionElement);
            card.appendChild(avatar);
            card.appendChild(info);
            card.appendChild(pointsDisplay);

            return card;
        }

        function renderStatus(message, type = 'info') {
            const container = document.getElementById('rankingContainer');
            container.innerHTML = '';
            const status = document.createElement('p');
            status.className = `status-message status-${type}`;
            status.textContent = message;
            container.appendChild(status);
        }

        function renderRanking(players) {
            const container = document.getElementById('rankingContainer');
            container.innerHTML = '';
            const fragment = document.createDocumentFragment();
            players.forEach((player, index) => {
                fragment.appendChild(createPlayerCard(player, index + 1));
            });
            container.appendChild(fragment);
        }

        function renderUpdatedAt() {
            const updatedAt = document.getElementById('updatedAt');
            if (!updatedAt) return;
            updatedAt.textContent = `Atualizado em ${new Intl.DateTimeFormat('pt-BR', {
                dateStyle: 'short',
                timeStyle: 'short'
            }).format(new Date())}`;
        }

        function renderPlayerCount(n) {
            const badge = document.getElementById('playerCountBadge');
            if (!badge) return;
            badge.textContent = `${n} ${n === 1 ? 'jogador' : 'jogadores'}`;
        }

        function init() {
            const container = document.getElementById('rankingContainer');
            try {
                const dataElement = document.getElementById('rankingData');
                if (!dataElement || !dataElement.textContent.trim()) {
                    throw new Error('Bloco de dados JSON não encontrado na página.');
                }

                const rawPlayers = JSON.parse(dataElement.textContent);
                if (!Array.isArray(rawPlayers)) {
                    throw new Error('Formato de dados inválido: esperado um array.');
                }

                const sortedPlayers = sortPlayers(rawPlayers);

                if (sortedPlayers.length === 0) {
                    renderStatus('Nenhum dado disponível no momento.');
                    renderPlayerCount(0);
                    return;
                }

                renderRanking(sortedPlayers);
                renderUpdatedAt();
                renderPlayerCount(sortedPlayers.length);
                container.setAttribute('aria-busy', 'false');
            } catch (error) {
                console.error('Erro ao renderizar ranking:', error);
                renderStatus('Não foi possível ler os dados do ranking. Confira o JSON embutido nesta página.', 'error');
                container.setAttribute('aria-busy', 'false');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
